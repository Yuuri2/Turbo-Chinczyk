services:
  db:
    image: postgres:16-alpine
    container_name: chinczyk-db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chinczyk}
      POSTGRES_USER:     ${POSTGRES_USER:-chinczyk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Ustaw POSTGRES_PASSWORD w pliku .env}

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./baza/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro

    ports:
      - "127.0.0.1:5432:5432"    # tylko loopback - dla IDE i `vite dev`

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chinczyk_user} -d ${POSTGRES_DB:-chinczyk}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    container_name: chinczyk-backend
    restart: unless-stopped

    environment:
      PGHOST: db                                # nazwa serwisu w sieci Dockera
      PGPORT: 5432
      POSTGRES_DB:       ${POSTGRES_DB:-chinczyk}
      POSTGRES_USER:     ${POSTGRES_USER:-chinczyk_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s          # Spring wstaje wolniej niż reszta

  frontend:
    build: ./frontend
    container_name: chinczyk-frontend
    restart: unless-stopped

    environment:
      PORT: 3000
      ORIGIN: ${ORIGIN:-http://localhost}       # wymagane przez CSRF SvelteKita
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-chinczyk}
      PGUSER:     ${POSTGRES_USER:-chinczyk_user}
      PGPASSWORD: ${POSTGRES_PASSWORD:?}

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: chinczyk-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  pgdata: